name: Build and Push All Services to Docker Hub

# Triggers on every push to main branch
on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:

      # Step 1 — Checkout your code from GitHub
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2 — Login to Docker Hub using secrets you configure in GitHub
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Step 3 — Set up Java 21 to build the jars
      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      # Step 4 — Cache Maven dependencies
      # So dependencies are not re-downloaded on every push
      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      # ─── Eureka Server ────────────────────────────────────────────────

      - name: Build eureka-server jar
        working-directory: ./eureka-server
        run: mvn package -DskipTests -q

      - name: Build and push eureka-server image
        uses: docker/build-push-action@v5
        with:
          context: ./eureka-server
          push: true
          tags: utkarshraj309/eureka-server:latest

      # ─── Auth Service ─────────────────────────────────────────────────

      - name: Build auth-service jar
        working-directory: ./auth-service
        run: mvn package -DskipTests -q

      - name: Build and push auth-service image
        uses: docker/build-push-action@v5
        with:
          context: ./auth-service
          push: true
          tags: utkarshraj309/auth-service:latest

      # ─── Product Service ──────────────────────────────────────────────

      - name: Build product-service jar
        working-directory: ./product-service
        run: mvn package -DskipTests -q

      - name: Build and push product-service image
        uses: docker/build-push-action@v5
        with:
          context: ./product-service
          push: true
          tags: utkarshraj309/product-service:latest

      # ─── Warehouse Service ────────────────────────────────────────────

      - name: Build warehouse-service jar
        working-directory: ./warehouse-service
        run: mvn package -DskipTests -q

      - name: Build and push warehouse-service image
        uses: docker/build-push-action@v5
        with:
          context: ./warehouse-service
          push: true
          tags: utkarshraj309/warehouse-service:latest

      # ─── Purchase Service ─────────────────────────────────────────────

      - name: Build purchase-service jar
        working-directory: ./purchase-service
        run: mvn package -DskipTests -q

      - name: Build and push purchase-service image
        uses: docker/build-push-action@v5
        with:
          context: ./purchase-service
          push: true
          tags: utkarshraj309/purchase-service:latest

      # ─── Supplier Service ─────────────────────────────────────────────

      - name: Build supplier-service jar
        working-directory: ./supplier-service
        run: mvn package -DskipTests -q

      - name: Build and push supplier-service image
        uses: docker/build-push-action@v5
        with:
          context: ./supplier-service
          push: true
          tags: utkarshraj309/supplier-service:latest

      # ─── Movement Service ─────────────────────────────────────────────

      - name: Build movement-service jar
        working-directory: ./movement-service
        run: mvn package -DskipTests -q

      - name: Build and push movement-service image
        uses: docker/build-push-action@v5
        with:
          context: ./movement-service
          push: true
          tags: utkarshraj309/movement-service:latest

      # ─── Alert Service ────────────────────────────────────────────────

      - name: Build alert-service jar
        working-directory: ./alert-service
        run: mvn package -DskipTests -q

      - name: Build and push alert-service image
        uses: docker/build-push-action@v5
        with:
          context: ./alert-service
          push: true
          tags: utkarshraj309/alert-service:latest

      # ─── Report Service ───────────────────────────────────────────────

      - name: Build report-service jar
        working-directory: ./report-service
        run: mvn package -DskipTests -q

      - name: Build and push report-service image
        uses: docker/build-push-action@v5
        with:
          context: ./report-service
          push: true
          tags: utkarshraj309/report-service:latest

      # ─── API Gateway (last — depends on all services) ─────────────────

      - name: Build api-gateway jar
        working-directory: ./api-gateway
        run: mvn package -DskipTests -q

      - name: Build and push api-gateway image
        uses: docker/build-push-action@v5
        with:
          context: ./api-gateway
          push: true
          tags: utkarshraj309/api-gateway:latest